<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Horario - Nitro Tienda</title>
    <style>
        /* Variables de diseño con paleta de morados modernos */
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c20 0%, #15102a 100%);
            --white-glass: rgba(255, 255, 255, 0.95); 
            --text-main: #f3f4f6;
            --text-muted: #a78bfa;
            --purple-glow: #c084fc;
            --early-color: #10b981; 
            --ontime-color: #3b82f6; 
            --late-color: #ef4444;   
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            overflow: hidden; 
        }

        /* Contenedor principal centrado */
        .main-container {
            width: 100%;
            max-width: 1100px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0rem; 
        }

        /* Card del Logo: Ajustado estrictamente al tamaño de la imagen */
        .logo-card {
            background: var(--white-glass);
            border: none;
            border-radius: 24px;
            padding: 1.5rem 3.5rem;
            width: fit-content; 
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .logo {
            width: 100%;
            max-width: 260px; 
            height: auto;
            display: block;
        }

        /* Fila de Contenido */
        .content-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 4rem; 
            width: 100%;
        }

        /* Contenedor de la imagen del lagarto */
        .mascot-container {
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mascot-img {
            width: 100%;
            max-width: 320px; 
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.6)); 
        }

        /* Sección de Información: Alineación absoluta al medio entre sí */
        .info-section {
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            min-width: 480px; 
        }

        /* Reloj digital gigante */
        .clock-display {
            font-size: 7rem; 
            font-weight: 800;
            letter-spacing: -3px;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            margin-bottom: 0.75rem;
            background: linear-gradient(to right, #ffffff 50%, var(--purple-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(168, 85, 247, 0.4));
        }

        /* Estilo de la Fecha */
        .date-display {
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 2rem;
            text-transform: capitalize;
        }

        /* Estado del Marcador */
        .status-badge {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 1.4rem;
            font-weight: 700;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
        }

        .status-early { background-color: rgba(16, 185, 129, 0.15); color: var(--early-color); border: 1px solid var(--early-color); }
        .status-ontime { background-color: rgba(59, 130, 246, 0.15); color: var(--ontime-color); border: 1px solid var(--ontime-color); }
        .status-late { background-color: rgba(239, 68, 68, 0.15); color: var(--late-color); border: 1px solid var(--late-color); }
        .status-loading { background-color: rgba(255, 255, 255, 0.05); color: #9ca3af; }

        /* Ajustes adaptativos para el modo vertical */
        @media (max-width: 890px) {
            .content-row {
                flex-direction: column; 
                gap: 2rem;
            }
            .info-section {
                min-width: 100%;
            }
            .clock-display { font-size: 5.5rem; }
            .date-display { font-size: 1.3rem; }
            .mascot-img { max-width: 240px; } 
            .logo-card { padding: 1.25rem 2rem; }
            .logo { max-width: 200px; }
            .main-container { gap: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="logo-card">
            <img class="logo" src="https://nitro-tienda.com/web/image/website/1/logo/Nitro?unique=4ff2831" alt="Nitro Tienda Logo">
        </div>

        <div class="content-row">
            <div class="mascot-container">
                <img class="mascot-img" src="https://i.ibb.co/N25tQ11y/Dise-o-sin-t-t-lo-Photoroom-1.png" alt="Mascota Nitro">
            </div>

            <div class="info-section">
                <div id="clock" class="clock-display">--:--:--</div>
                <div id="date" class="date-display">Sincronizando fecha...</div>
                <div id="status" class="status-badge status-loading">Sincronizando...</div>
            </div>
        </div>
    </div>

    <script>
        const TIMEZONE = 'America/Lima';
        const API_URL = `https://worldtimeapi.org/api/timezone/${TIMEZONE}`;

        let serverTime = null;
        let localStartTime = null;

        const timeFormatter = new Intl.DateTimeFormat('es-PE', {
            timeZone: TIMEZONE,
            hour: '2-digit', minute: '2-digit', second: '2-digit',
            hour12: false
        });

        const dateFormatter = new Intl.DateTimeFormat('es-PE', {
            timeZone: TIMEZONE,
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        function evaluateSchedule(hours, minutes) {
            const totalMinutes = (hours * 60) + minutes;
            
            // Hitos de tiempo calculados en minutos totales desde las 00:00
            const limitArrivalMinutes = (8 * 60) + 5; // 08:05
            const lunchStartMinutes = 13 * 60;        // 13:00
            const lunchEndMinutes = 14 * 60;          // 14:00
            const departureMinutes = 17 * 60;         // 17:00

            // 1. Bloque de la Mañana (Hasta antes de la 1:00 PM)
            if (totalMinutes < lunchStartMinutes) { 
                if (totalMinutes < limitArrivalMinutes) {
                    return { text: "🚀 ¡Excelente! Listo para romperla hoy", className: "status-early" };
                }
                if (totalMinutes === limitArrivalMinutes) {
                    return { text: "⏱️ ¡Precisión quirúrgica! Justo a tiempo", className: "status-ontime" };
                }
                return { text: "☕ El día ya empezó, ¡vamos a sumarnos!", className: "status-late" };
            } 
            
            // 2. Bloque del Almuerzo (Entre la 1:00 PM y las 2:00 PM)
            else if (totalMinutes >= lunchStartMinutes && totalMinutes < lunchEndMinutes) {
                return { text: "🍲 ¡Hora de recargar energías! Buen provecho", className: "status-ontime" };
            } 
            
            // 3. Bloque de la Tarde y Salida (A partir de las 2:00 PM)
            else { 
                if (totalMinutes < departureMinutes) {
                    return { text: "💪 ¡De vuelta a la acción! Segunda mitad del día", className: "status-early" };
                }
                return { text: "🌌 ¡Misión cumplida! Disfruta tu descanso", className: "status-early" };
            }
        }

        async function syncWithInternetTime() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                serverTime = new Date(data.datetime);
                localStartTime = performance.now();
                
                updateClock();
                setInterval(updateClock, 1000);
            } catch (error) {
                console.warn("Fallo de red, usando reloj local como respaldo.");
                serverTime = new Date();
                localStartTime = performance.now();
                updateClock();
                setInterval(updateClock, 1000);
            }
        }

        function updateClock() {
            if (!serverTime) return;

            const elapsed = performance.now() - localStartTime;
            const currentTime = new Date(serverTime.getTime() + elapsed);

            const timeParts = timeFormatter.formatToParts(currentTime);
            const timeObj = Object.fromEntries(timeParts.map(p => [p.type, p.value]));

            const hours = parseInt(timeObj.hour, 10);
            const minutes = parseInt(timeObj.minute, 10);

            document.getElementById('clock').textContent = `${timeObj.hour}:${timeObj.minute}:${timeObj.second}`;
            document.getElementById('date').textContent = dateFormatter.format(currentTime);

            const evaluation = evaluateSchedule(hours, minutes);
            const statusElement = document.getElementById('status');
            statusElement.textContent = evaluation.text;
            statusElement.className = `status-badge ${evaluation.className}`;
        }

        document.addEventListener('DOMContentLoaded', syncWithInternetTime);
    </script>
</body>
</html>
